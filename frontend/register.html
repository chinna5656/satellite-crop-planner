<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Satellite Crop Planner</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            font-family: "Noto Sans Thai", "Leelawadee UI", "Tahoma", sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#10b981 0.75px, transparent 0.75px), radial-gradient(#10b981 0.75px, #f8fafc 0.75px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">
    
    <!-- ส่วนหัว -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="mx-auto h-16 w-16 bg-emerald-100 rounded-2xl flex items-center justify-center shadow-sm border border-emerald-200">
            <svg class="h-9 w-9 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
        </div>
        <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900 tracking-tight">
            สร้างบัญชีใหม่
        </h2>
        <p class="mt-2 text-center text-sm text-slate-500 font-medium">
            เข้าร่วมใช้งานระบบ Satellite Crop Planner
        </p>
    </div>

    <!-- ส่วนฟอร์มสมัครสมาชิก -->
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="bg-white/90 backdrop-blur-md py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border border-slate-100">
            <form id="registerForm" class="space-y-6">
                
                <div>
                    <label for="username" class="block text-sm font-bold text-slate-700">ชื่อผู้ใช้งาน</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input id="username" type="text" required 
                            class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm transition-colors" 
                            placeholder="ตั้งชื่อผู้ใช้งานของคุณ">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700">รหัสผ่าน</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="password" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm transition-colors" 
                            placeholder="กำหนดรหัสผ่าน (อย่างน้อย 6 ตัวอักษร)">
                    </div>
                </div>

                <!-- กล่องข้อความแจ้งเตือน Error และ Success -->
                <p id="errorMessage" style="display: none;" class="rounded-lg bg-red-50 p-3 border border-red-200 text-sm font-semibold text-red-600 text-center shadow-sm"></p>
                <p id="successMessage" style="display: none;" class="rounded-lg bg-emerald-50 p-3 border border-emerald-200 text-sm font-semibold text-emerald-600 text-center shadow-sm"></p>

                <div class="pt-2">
                    <button type="submit" id="submitBtn"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-bold text-white bg-slate-800 hover:bg-slate-900 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all duration-200">
                        ยืนยันการสมัครสมาชิก
                    </button>
                </div>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
                มีบัญชีอยู่แล้ว? 
                <a href="/login" class="font-bold text-emerald-600 hover:text-emerald-500 transition-colors">เข้าสู่ระบบที่นี่</a>
            </p>
        </div>
    </div>
    
    <script src="/static/register.js"></script>
</body>
</html>
